services:
  # Backend API Service
  - type: web
    name: rag-backend
    runtime: python
    pythonVersion: "3.11"
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        value: sqlite:///./rag.db
      - key: DEBUG
        value: "False"
    healthCheckPath: /api/health
    autoDeploy: true
    buildFilter:
      paths:
      - backend/**/*.py
      - backend/requirements.txt

  # Frontend Static Site
  - type: static
    name: rag-frontend
    rootDir: frontend
    envVars:
      - key: SKIP_INSTALL_DEPS
        value: "true"
      - key: VITE_API_URL
        fromService:
          name: rag-backend
          type: web
          property: url
    buildCommand: npm install && npm run build
    staticPublishPath: frontend/dist
    redirects:
      - source: /*
        destination: /index.html
        type: rewrite
    buildFilter:
      paths:
      - frontend/**/*