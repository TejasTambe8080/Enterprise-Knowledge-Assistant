services:
  - type: web
    name: rag-backend
    runtime: python
    pythonVersion: "3.11"
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        value: sqlite:///./rag.db
      - key: DEBUG
        value: "False"
    healthCheckPath: /api/health
    autoDeploy: true

  - type: static
    name: rag-frontend
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_URL
        fromService:
          name: rag-backend
          type: web
          property: url
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
